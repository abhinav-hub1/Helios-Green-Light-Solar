<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  width: 100%;
}

h2 {
  margin-bottom: 30px;
}

.btn {
  width: 80%;
  max-width: 300px;
  padding: 15px;
  margin: 10px auto;
  display: block;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #1e88e5, #42a5f5);
  color: white;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="container">
  <h2>Solar Installation</h2>

  <button class="btn" onclick="goToForm('create')">
    ➕ Create New
  </button>

  <button class="btn" onclick="goToForm('edit')">
    ✏️ Edit Existing
  </button>
</div>

<script>
function goToForm(mode) {
  window.location.href = "index.html?mode=" + mode;
}
</script>

</body>
</html>
