<!DOCTYPE html>
<html>
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body { font-family: Arial; background:#f1f1f1; margin:0; }

.header {
  background:#1e88e5; height:55px;
  display:flex; align-items:center; justify-content:center;
  position:relative; color:white;
}

.header-title { font-size:18px; font-weight:600; }

.profile-circle {
  position:absolute; right:12px;
  width:38px; height:38px; border-radius:50%;
  background:white; color:#1e88e5;
  display:flex; align-items:center; justify-content:center;
}

.container { padding:12px; }

label { margin-top:12px; font-weight:600; display:block; }

input {
  width:100%; padding:12px; margin-top:5px;
  border-radius:6px; border:1px solid #ccc;
  background:#eee;
}

input[readonly] { background:#e0e0e0; }

.row { display:flex; gap:6px; }

.icon-btn {
  width:45px; border:none; border-radius:6px;
  background:#1e88e5; color:white;
}

.file-box {
  background:#eee; padding:10px; margin-top:8px;
  border-radius:6px; position:relative;
}

.delete-btn {
  position:absolute; right:10px; top:35px;
  display:none; border:none; background:white;
  border-radius:50%;
}

.submit-btn {
  width:100%; margin-top:20px;
  padding:14px; background:#2e7d32;
  color:white; border:none;
}

.error {
  background:#ffebee;
  color:#c62828;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
  display:none;
}

#duplicateMsg {
  background:#fff3e0;
  color:#ef6c00;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">Solar Installation</div>
</div>

<div class="container">

<div id="loading">Loading... ⏳</div>

<label>Service Number</label>
<div class="row">
  <input id="service" oninput="resetMessages()">
  <button class="icon-btn" onclick="fetchData()">🔍</button>
</div>

<div id="duplicateMsg"></div>
<div id="errorMsg" class="error"></div>

<label>Name</label>
<input id="name">

<label>Phone</label>
<input id="phone">

<label>Address</label>
<input id="address">

<label>Division</label>
<input id="division">

<label>Sub Division</label>
<input id="subdivision">

<label>Section</label>
<input id="section">

<label>Distribution</label>
<input id="distribution">

<h3>Upload Images</h3>

<div class="file-box">
  <label>Panels</label>
  <input type="file" id="panels" onchange="showDelete(this)">
  <button class="delete-btn" onclick="removeFile('panels')">
    <span class="material-icons">delete</span>
  </button>
</div>

<button class="submit-btn" onclick="submitForm()">Submit</button>

</div>

<script>

let mode = "create";
let isVerified = false;
let verifiedService = "";

const loading = document.getElementById("loading");
const errorMsg = document.getElementById("errorMsg");
const duplicateMsg = document.getElementById("duplicateMsg");

function lockFields(lock=true){
["name","phone","address","division","subdivision","section","distribution"]
.forEach(id=>{
  const el=document.getElementById(id);
  el.readOnly=lock;
});
}

async function fetchData(){

isVerified=false;

const serviceInput=document.getElementById("service");
const service=serviceInput.value.trim();
if(!service) return;

loading.style.display="block";

try{

const res=await fetch("YOUR_API?service="+service);
const data=await res.json();

if(!data || data.name==="NOT FOUND"){
errorMsg.innerText="❌ Not found";
errorMsg.style.display="block";
lockFields(false);
return;
}

document.getElementById("name").value=data.name;
document.getElementById("phone").value=data.phone;
document.getElementById("address").value=data.address;
document.getElementById("division").value=data.division;
document.getElementById("subdivision").value=data.subdivision;
document.getElementById("section").value=data.section;
document.getElementById("distribution").value=data.distribution;

const checkRes=await fetch("YOUR_API_CHECK");
const checkData=await checkRes.json();

const exists=checkData.length>0;

if(mode==="create"){
if(exists){
duplicateMsg.innerText="Already exists";
duplicateMsg.style.display="block";
lockFields(true);
}else{
lockFields(false);
serviceInput.readOnly=true;
}
}

if(mode==="edit"){
if(!exists){
errorMsg.innerText="Not submitted";
errorMsg.style.display="block";
}else{
lockFields(true);
}
}

if((mode==="create" && !exists)||(mode==="edit" && exists)){
isVerified=true;
verifiedService=service;
}

}catch(err){
errorMsg.innerText="Error";
errorMsg.style.display="block";
}

loading.style.display="none";
}

async function submitForm(){

const service=document.getElementById("service").value.trim();

if(!isVerified){
errorMsg.innerText="Verify first";
errorMsg.style.display="block";
return;
}

if(service!==verifiedService){
errorMsg.innerText="Service changed";
errorMsg.style.display="block";
return;
}

const panelsInput=document.getElementById("panels");

const panelsData = panelsInput.files.length
? await compressImage(panelsInput)
: undefined;

const data={
serviceNumber:service,
name:document.getElementById("name").value,
panels:panelsData
};

await fetch("YOUR_POST_API",{
method:"POST",
body:JSON.stringify(data)
});

alert("Done");

}

function compressImage(input){
return new Promise(resolve=>{
const file=input.files[0];
if(!file) return resolve("");
const reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);
});
}

function showDelete(input){
const btn=input.parentElement.querySelector(".delete-btn");
btn.style.display=input.files.length?"block":"none";
}

function removeFile(id){
const input=document.getElementById(id);
input.value="";
input.parentElement.querySelector(".delete-btn").style.display="none";
}

function resetMessages(){
errorMsg.style.display="none";
duplicateMsg.style.display="none";
isVerified=false;
}

</script>

</body>
</html>
