<!DOCTYPE html>

<html>
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f1f1f1;
  margin: 0;
}

.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

.header-title {
  font-size: 18px;
  font-weight: 600;
}

.menu-btn {
  position: absolute;
  left: 12px;
  cursor: pointer;
}

.profile-circle {
  position: absolute;
  right: 12px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: white;
  color: #1e88e5;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.container {
  padding: 12px;
}

label {
  font-weight: 600;
  margin-top: 12px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #eee;
}

.row {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 45px;
  background: #1e88e5;
  border: none;
  color: white;
  border-radius: 6px;
}

.file-box {
  background: #eee;
  border-radius: 6px;
  padding: 10px;
  margin-top: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.file-wrapper {
  position: relative;
}

.delete-btn {
  position: absolute;
  right: 10px;
  top: 5px;
  background: white;
  border-radius: 50%;
  border: none;
  display: none;
  padding: 6px;
}

.delete-btn .material-icons {
  color: red;
}

.submit-btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 6px;
}

.error {
  color: red;
  text-align: center;
  display: none;
}

#loading {
  text-align: center;
  display: none;
  color: blue;
}

/* SIDE MENU */
.side-menu {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: white;
  box-shadow: 2px 0 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 1000;
  padding-top: 60px;
}

.side-menu.open {
  left: 0;
}

.menu-item {
  padding: 15px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  display: none;
  z-index: 999;
}
</style>

</head>

<body>

<div id="sideMenu" class="side-menu">
  <div class="menu-item" onclick="setMode('create')">Create New</div>
  <div class="menu-item" onclick="setMode('edit')">Edit Existing</div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">
    <span class="material-icons">menu</span>
  </div>
  <div class="header-title">Solar Installation</div>
  <div class="profile-circle" onclick="openDashboard()">👤</div>
</div>

<div class="container" id="formScreen">

<div id="loading">Loading... ⏳</div>

<label>Service Number</label>

<div class="row">
<input id="service" onkeypress="handleKey(event)">
<button class="icon-btn" onclick="fetchData()">🔍</button>
<button class="icon-btn" onclick="reloadForm()">⟳</button>
</div>

<div id="duplicateMsg" class="error">Already submitted</div>
<div id="errorMsg" class="error"></div>

<label>Name</label> <input id="name">

<label>Phone</label> <input id="phone">

<label>Address</label> <input id="address">

<h3>Upload Images</h3>

<div class="file-box file-wrapper">
<label>Panels</label>
<input type="file" id="panels" onchange="showDelete(this)">
<button class="delete-btn" onclick="removeFile('panels')">
<span class="material-icons">delete</span>
</button>

<label>Panel No.1</label> <input id="panel1">

<label>Panel No.2</label> <input id="panel2">

<label>Panel No.3</label> <input id="panel3">

<label>Panel No.4</label> <input id="panel4">

</div>

<div class="file-box file-wrapper">
<label>Inverter</label>
<input type="file" id="inverter" onchange="showDelete(this)">
<button class="delete-btn" onclick="removeFile('inverter')">
<span class="material-icons">delete</span>
</button>

<label>Inverter Serial</label> <input id="inverterSerial">

</div>

<button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit</button>

</div>

<script>

/* GLOBAL FIX */
const loading = document.getElementById("loading");
const errorMsg = document.getElementById("errorMsg");
const duplicateMsg = document.getElementById("duplicateMsg");
const submitBtn = document.getElementById("submitBtn");
const formScreen = document.getElementById("formScreen");

let mode = "create";

/* MENU */
function toggleMenu(){
  const m=document.getElementById("sideMenu");
  const o=document.getElementById("overlay");
  m.classList.toggle("open");
  o.style.display=m.classList.contains("open")?"block":"none";
}

function setMode(m){
  mode=m;
  document.querySelector(".header-title").innerText=
  m==="edit"?"Edit Entry":"New Entry";
  toggleMenu();
}

/* FILE */
function showDelete(i){
  i.parentElement.querySelector(".delete-btn").style.display=i.files.length?"block":"none";
}

function removeFile(id){
  const i=document.getElementById(id);
  i.value="";
  i.parentElement.querySelector(".delete-btn").style.display="none";
}

/* FETCH */
async function fetchData(){
  const s=service.value;
  if(!s)return;

  loading.style.display="block";

  const res=await fetch("https://script.google.com/macros/s/AKfycbwhlMxTxB4pPXi6ApKLO60yRMF_HKSutI0R98xv-S3fyLxsVCQ0jUosaLaUDBQIa88v/exec?service="+s);
  const d=await res.json();

  loading.style.display="none";

  if(!d || d.name==="NOT FOUND"){
    errorMsg.innerText="Service not found";
    errorMsg.style.display="block";
    clearFields();
    return;
  }

  name.value=d.name;
  phone.value=d.phone;
  address.value=d.address;
}

/* SUBMIT */
async function submitForm(){

if(!service.value.trim()){
  errorMsg.innerText="Service required";
  errorMsg.style.display="block";
  return;
}

submitBtn.disabled=true;
loading.style.display="block";

const panelsData=await compress(panels);
const inverterData=await compress(inverter);

const data={
  mode,
  serviceNumber:service.value,
  name:name.value,
  phone:phone.value,
  address:address.value,
  panels:panelsData,
  panel1:panel1.value,
  panel2:panel2.value,
  panel3:panel3.value,
  panel4:panel4.value,
  inverter:inverterData,
  inverterSerial:inverterSerial.value
};

const res=await fetch("https://script.google.com/macros/s/AKfycbwhlMxTxB4pPXi6ApKLO60yRMF_HKSutI0R98xv-S3fyLxsVCQ0jUosaLaUDBQIa88v/exec",{
  method:"POST",
  body:JSON.stringify(data)
});

const r=await res.json();

loading.style.display="none";
submitBtn.disabled=false;

if(r.status==="ALREADY_SUBMITTED" && mode==="create"){
  duplicateMsg.style.display="block";
  return;
}

alert("Saved Successfully");
}

/* COMPRESS */
function compress(input){
 return new Promise(res=>{
  const f=input.files[0];
  if(!f)return res("");
  const r=new FileReader();
  r.onload=e=>res(e.target.result);
  r.readAsDataURL(f);
 });
}

/* RESET */
function reloadForm(){
  location.reload();
}

function clearFields(){
  name.value="";
  phone.value="";
  address.value="";
  panel1.value="";
  panel2.value="";
  panel3.value="";
  panel4.value="";
  inverterSerial.value="";
}

function handleKey(e){
  if(e.key==="Enter") fetchData();
}

function openDashboard(){
  window.location.href="dashboard.html";
}

</script>

</body>
</html>
