 function showDivision(e, divisionName) {

  document.getElementById("btn2").disabled = true;

  setTimeout(() => {

    let divisionData = fullData.filter(item => {
      const div = (item.division || "").toLowerCase().trim();
      const btnName = divisionName.toLowerCase().trim();
      return div.replace(/\s+/g, "") === btnName.replace(/\s+/g, "");

             d.getMonth() === today.getMonth() &&
             d.getDate() === today.getDate();

    document.getElementById("totalCount").style.display = "block";

let fullData = [];

// ✅ SAFE IST CONVERSION
function toIST(dateInput) {
  if (!dateInput) return null;

  // convert "yyyy-MM-dd HH:mm:ss" → proper Date
  const parts = dateInput.split(/[- :]/);

  return new Date(
    parts[0],
    parts[1] - 1,
    parts[2],
    parts[3],
    parts[4],
    parts[5]
  );
}

// ✅ TODAY (IST)
function getTodayIST() {
  const now = new Date();

  // ✅ Get IST parts directly
  const formatter = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  });

  const parts = formatter.formatToParts(now);

  const year = parts.find(p => p.type === "year").value;
  const month = parts.find(p => p.type === "month").value;
  const day = parts.find(p => p.type === "day").value;

  return new Date(year, month - 1, day);
}

// 🚀 LOAD DATA
async function loadData() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbw8Iuo-DLYM9Uw5-4AeA23L0xwEwEONjZL3pAfDq-JAsnRmPy3c1sj_Wb-JBQoEtLXn/exec?type=all&t=" + Date.now());
  fullData = await res.json();

// ✅ Remove unnecessary re-renders
fullData = fullData.filter(item => item.timestamp);
  document.getElementById("btn1").disabled = false;
  document.getElementById("btn2").disabled = false;
}

// 🎯 RENDER
function renderData(data, isToday = false) {

  document.getElementById("totalCount").style.display = "block";
    const container = document.getElementById("data");
  container.innerHTML = "";

  if (data.length === 0) {
  container.innerHTML = "<p style='text-align:center;'>No data found</p>";
    return;
}


  let currentDate = "";

  // 🔄 Loop data
  data.slice().reverse().forEach(item => {

    const d = toIST(item.timestamp);
    if (!d) return; // skip invalid

    // ✅ DATE (manual → no timezone issue)
    const dateStr =
      String(d.getDate()).padStart(2, "0") + "/" +
      String(d.getMonth() + 1).padStart(2, "0") + "/" +
      d.getFullYear();

    // 📅 Group by date
    if (dateStr !== currentDate) {
      currentDate = dateStr;
      container.innerHTML += `<div class="date-header">${dateStr}</div>`;
    }

    // ✅ TIME (FORCED IST)
    const time = d.toLocaleTimeString("en-IN", {
      hour: "2-digit",
      minute: "2-digit",
      hour12: true,
      timeZone: "Asia/Kolkata"
    });

    // 🧾 Card UI
    container.innerHTML += `
      <div class="card">
        <b>${item.service}</b><br>
        ${item.name}<br>
        ${item.phone}<br>
        ${item.surveyor || "-"}<br>
        <div class="time">${time}</div>
      </div>
    `;
  });

}

// 🔍 FILTER (FIXED WITH TIMESTAMP)
function applyFilter() {

  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const fromTime = from ? new Date(from).getTime() : null;
  const toTime = to ? new Date(to).getTime() : null;

  const divisionName = document.getElementById("totalCount").innerText.split("|")[0].trim();

  // ✅ Filter only selected division
  let divisionData = fullData.filter(item => {
    const div = (item.division || "").toLowerCase().trim();
    return div.replace(/\s+/g, "") === divisionName.toLowerCase().replace(/\s+/g, "");
  });

  const filtered = divisionData.filter(item => {

    const d = toIST(item.timestamp);
    if (!d) return false;

    const time = d.getTime();

    if (fromTime && time < fromTime) return false;
    if (toTime && time > toTime + 86400000) return false;

    return true;
  });

  renderData(filtered, false);
  document.getElementById("filterPanel").style.display = "none";
}

// ❌ CLEAR
function clearFilter() {
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  // reload current division (today view)
  const divisionName = document.getElementById("totalCount").innerText.split("|")[0].trim();
  showDivision(divisionName);
    
  document.getElementById("filterPanel").style.display = "none";
}

// UI
function toggleFilter() {
  const p = document.getElementById("filterPanel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function goBack() {

  const dataVisible = document.getElementById("data").style.display === "block";

  if (dataVisible) {
    // ✅ Entries → Dashboard
    document.getElementById("data").style.display = "none";
    document.getElementById("divisionSection").style.display = "block";
    document.getElementById("totalCount").style.display = "none";
  } else {
    // ✅ Dashboard → Index page
    window.location.href = "index.html";
  }
}

// INIT
loadData();
