<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: bold;
}

.back-btn { position: absolute; left: 12px; cursor: pointer; }

.filter-btn {
  position: absolute;
  right: 12px;
  background: white;
  color: #1e88e5;
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
}

#filterPanel {
  display: none;
  position: absolute;
  top: 65px;
  right: 10px;
  width: 240px;
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

input { width: 100%; padding: 8px; margin-bottom: 10px; }

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
}

.apply-btn { background: #1e88e5; color: white; }
.clear-btn { background: red; color: white; }

.count-box {
  text-align: center;
  padding: 10px;
  background: #e3f2fd;
  font-weight: bold;
}

.container { padding: 10px; }

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.date-header {
  font-weight: bold;
  margin: 10px 5px;
  color: #1e88e5;
}

.time { font-size: 12px; color: gray; }
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
  <div class="filter-btn" onclick="toggleFilter()">Filter</div>
</div>

<div id="filterPanel">
  <label>From</label>
  <input type="date" id="fromDate">

  <label>To</label>
  <input type="date" id="toDate">

  <button class="apply-btn" onclick="applyFilter()">Apply</button>
  <button class="clear-btn" onclick="clearFilter()">Clear</button>
</div>

<div class="count-box" id="totalCount">Loading...</div>

<div class="container" id="data"></div>

<script>

let fullData = [];

// ✅ Convert backend timestamp → IST
function toIST(dateInput) {
  if (!dateInput) return null;

  try {
    if (typeof dateInput === "string") {
      // ✅ Convert to ISO + IST
      dateInput = dateInput.replace(" ", "T") + "+05:30";
    }

    const d = new Date(dateInput);

    // ✅ Check if valid
    if (isNaN(d.getTime())) return null;

    return d;

  } catch (e) {
    return null;
  }
}

// ✅ Get today's IST date
function getTodayIST() {
  const now = new Date();

  const ist = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
  );

  return new Date(
    ist.getFullYear(),
    ist.getMonth(),
    ist.getDate()
  );
}

// 🚀 Load Data
async function loadData() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbw8Iuo-DLYM9Uw5-4AeA23L0xwEwEONjZL3pAfDq-JAsnRmPy3c1sj_Wb-JBQoEtLXn/exec?type=all&t=" + Date.now());
  fullData = await res.json();

  showToday();
}

// ✅ Show today's data
function showToday() {
  const today = getTodayIST();

  const todayData = fullData.filter(item => {
    const d = toIST(item.timestamp);

if (!d) return; // skip invalid rows
    return d && d.toDateString() === today.toDateString();
  });

  renderData(todayData, true);
}

// 🎯 Render Data
function renderData(data, isToday = false) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  document.getElementById("totalCount").innerText =
    isToday
      ? `Today: ${data.length} | Total: ${fullData.length}`
      : `Filtered: ${data.length} | Total: ${fullData.length}`;

  let currentDate = "";

  data.slice().reverse().forEach(item => {

    const d = toIST(item.timestamp);

    const dateStr = d.toLocaleDateString("en-GB");

    if (dateStr !== currentDate) {
      currentDate = dateStr;
      container.innerHTML += `<div class="date-header">${dateStr}</div>`;
    }

    const time = d.toLocaleTimeString("en-IN", {
      hour: "2-digit",
      minute: "2-digit"
    });

    container.innerHTML += `
      <div class="card">
        <b>${item.service}</b><br>
        ${item.name}<br>
        ${item.phone}<br>
        ${item.surveyor || "-"}<br>
        <div class="time">${time}</div>
      </div>
    `;
  });
}

// 🔍 Filter
function applyFilter() {

  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const filtered = fullData.filter(item => {

    const d = toIST(item.timestamp);

    const date =
      d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0");

    if (from && date < from) return false;
    if (to && date > to) return false;

    return true;
  });

  renderData(filtered, false);
}

// ❌ Clear filter
function clearFilter() {
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  showToday();
}

// UI
function toggleFilter() {
  const p = document.getElementById("filterPanel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function goBack() {
  window.location.href = "index.html";
}

// INIT
loadData();

</script>

</body>
</html>
