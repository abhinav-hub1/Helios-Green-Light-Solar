<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: bold;
}

.back-btn { position: absolute; left: 12px; cursor: pointer; }

.search-btn {
  background:  #1e88e5;
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#searchPanel {
  display: none;
  margin: 10px;
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

.search-option {
  padding: 8px;
  margin-bottom: 5px;
  background: #e3f2fd;
  border-radius: 6px;
  cursor: pointer;
}

#searchInputBox {
  display: none;
  margin-top: 10px;
}

input { width: 100%; padding: 8px; margin-bottom: 10px; }

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
}

.search-action { background: #1e88e5; color: white; }

.count-box {
  text-align: center;
  padding: 10px;
  background: #e3f2fd;
  font-weight: bold;
}

.div-btn {
  width: 90%;
  padding: 16px;
  margin: 12px auto;
  display: block;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #1e88e5, #1565c0);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.div-btn.loading {
  opacity: 0.6;
  pointer-events: none;
}

.container { padding: 10px; }

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.date-header {
  font-weight: bold;
  margin: 10px 5px;
  color: #1e88e5;
}

.time { font-size: 12px; color: gray; }
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
</div>

<div class="count-box" id="totalCount" style="display:none;"></div>
<div id="searchBar" style="display:none; padding:10px; text-align:center;">
  <button class="search-btn" onclick="toggleSearch()">Search By</button>
</div>
  <div id="searchPanel">
  
 <div id="searchOptions">
  <div class="search-option" onclick="selectSearch('service', 'Service Number')">Service Number</div>
  <div class="search-option" onclick="selectSearch('name', 'Customer Name')">Customer Name</div>
  <div class="search-option" onclick="selectSearch('phone', 'Phone Number')">Phone Number</div>
  <div class="search-option" onclick="selectSearch('subdivision', 'Sub Division Name')">Sub Division Name</div>
  <div class="search-option" onclick="selectSearch('section', 'Section Name')">Section Name</div>
  <div class="search-option" onclick="selectSearch('distribution', 'Distribution Name')">Distribution Name</div>

  <div class="search-option" onclick="selectDateFilter()">Filter By Date</div>
</div>

<!-- ✅ DATE FILTER -->
<div id="dateFilterBox" style="display:none;">
  <label>From Date</label>
  <input type="date" id="fromDate">

  <label>To Date</label>
  <input type="date" id="toDate">

  <button class="search-action" onclick="applyDateFilter()">Apply Filter</button>
</div>

  <div id="searchInputBox" style="display:none;">
    <div id="selectedLabel" style="margin-bottom:8px; font-weight:bold;"></div>
    <input type="text" id="searchInput" placeholder="Enter value">
    <button class="search-action" onclick="performSearch()">Search</button>
  </div>
    
</div>

<div id="divisionSection" style="padding:20px; text-align:center;">
  <button id="btn1" class="div-btn" onclick="showDivision(event, 'Tadepalligudem')">Tadepalligudem</button>
  <button id="btn2" class="div-btn" onclick="showDivision(event, 'Narsipatnam')">Narsipatnam</button>
</div>

<div class="container" id="data" style="display:none;"></div>
<!-- DETAILS VIEW -->
<div id="detailView" style="display:none; padding:15px;"></div>
<script>

let fullData = [];
let isProcessing = false;
let selectedSearchType = "";
let currentView = "home";
  let selectedDivision = "";

// SEARCH UI
function toggleSearch() {
  const panel = document.getElementById("searchPanel");

  if (panel.style.display === "block") {
    panel.style.display = "none";
  } else {
    panel.style.display = "block";

    document.getElementById("searchOptions").style.display = "block";
    document.getElementById("searchInputBox").style.display = "none";

    // ✅ ADD THIS
    document.getElementById("dateFilterBox").style.display = "none";
  }
}

function selectSearch(type, label) {

  selectedSearchType = type;

  // hide all options
  document.getElementById("searchOptions").style.display = "none";

  // show input section
  document.getElementById("searchInputBox").style.display = "block";

  // show selected label
  document.getElementById("selectedLabel").innerText = label;

  // clear input
  document.getElementById("searchInput").value = "";
}
function selectDateFilter() {
  document.getElementById("searchOptions").style.display = "none";
  document.getElementById("searchInputBox").style.display = "none";
  document.getElementById("dateFilterBox").style.display = "block";
}
  async function performSearch() {

    currentView = "search";
    if (!fullData.length) {
  await loadData();
}

  const value = document.getElementById("searchInput").value.trim();
  if (!value) return;

 /*const divisionName = document.getElementById("totalCount").innerText.split("|")[0].trim();*/
const divisionName = selectedDivision;
  const container = document.getElementById("data");
  container.innerHTML = "<p style='text-align:center;'>⏳ Searching...</p>";

  document.getElementById("divisionSection").style.display = "none";
  document.getElementById("data").style.display = "block";
  document.getElementById("totalCount").style.display = "block";

  try {

    const url = "https://script.google.com/macros/s/AKfycbw8Iuo-DLYM9Uw5-4AeA23L0xwEwEONjZL3pAfDq-JAsnRmPy3c1sj_Wb-JBQoEtLXn/exec"
      + "?action=search"
      + "&division=" + encodeURIComponent(divisionName)
      + "&field=" + encodeURIComponent(selectedSearchType)
      + "&value=" + encodeURIComponent(value)
      + "&t=" + Date.now();

    const res = await fetch(url);
    const result = await res.json();

    document.getElementById("totalCount").innerText =
      `Search Results: ${result.length}`;

    // 🔥 Attach full data using service number
const enrichedResult = result.map(r => {

  const rService = (r.service || "").toString().trim();

  const match = fullData.find(f => {
    const fService = (f.service || "").toString().trim();
    return fService === rService;
  });

  return match ? match : r;

});

// ✅ ADD THIS LINE
renderData(enrichedResult);

  } catch (err) {
    container.innerHTML = "<p style='text-align:center;'>Error fetching data</p>";
  }

  document.getElementById("searchPanel").style.display = "none";
}

// CLICK DIVISION
async function showDivision(e, divisionName) {
selectedDivision = divisionName;
  currentView = "division";

  if (isProcessing) return;
  isProcessing = true;

  const btn1 = document.getElementById("btn1");
  const btn2 = document.getElementById("btn2");

  const clickedBtn = e.currentTarget;

  btn1.disabled = true;
  btn2.disabled = true;

  clickedBtn.innerText = "⏳ Loading...";
  clickedBtn.classList.add("loading");

  try {

    if (!fullData.length) {
      await loadData();
    }

    let divisionData = fullData.filter(item => {
      const div = (item.division || "").toLowerCase().trim();
      return div.replace(/\s+/g, "") === divisionName.toLowerCase().replace(/\s+/g, "");
    });

    const today = getTodayIST();

    const todayData = divisionData.filter(item => {
      const d = toIST(item.timestamp);
      if (!d) return false;
      return d.getFullYear() === today.getFullYear() &&
             d.getMonth() === today.getMonth() &&
             d.getDate() === today.getDate();
    });

    document.getElementById("divisionSection").style.display = "none";
    document.getElementById("data").style.display = "block";
    document.getElementById("totalCount").style.display = "block";
document.getElementById("searchBar").style.display = "block";
    document.getElementById("totalCount").innerText =
      `${divisionName} | Today: ${todayData.length} | Total: ${divisionData.length}`;

    renderData(todayData);

  } catch (err) {
    alert("Error loading data");
  }

  isProcessing = false;
}

// FETCH
async function loadData() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbw8Iuo-DLYM9Uw5-4AeA23L0xwEwEONjZL3pAfDq-JAsnRmPy3c1sj_Wb-JBQoEtLXn/exec?type=all&t=" + Date.now());
  fullData = await res.json();
  fullData = fullData.filter(item => item.timestamp);
}

// DATE
function toIST(dateInput) {
  if (!dateInput) return null;
  const parts = dateInput.split(/[- :]/);
  return new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5]);
}

function getTodayIST() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  });
  const parts = formatter.formatToParts(now);
  const year = parts.find(p => p.type === "year").value;
  const month = parts.find(p => p.type === "month").value;
  const day = parts.find(p => p.type === "day").value;
  return new Date(year, month - 1, day);
}

// RENDER
function renderData(data) {
  const container = document.getElementById("data");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<p style='text-align:center;'>No data found</p>";
    return;
  }

  let currentDate = "";

  data.slice().reverse().forEach(item => {

    const d = toIST(item.timestamp);
    if (!d) return;

    // 📅 Date format
    const dateStr =
      String(d.getDate()).padStart(2, "0") + "/" +
      String(d.getMonth() + 1).padStart(2, "0") + "/" +
      d.getFullYear();

    // 🔹 Group by date
    if (dateStr !== currentDate) {
      currentDate = dateStr;
      container.innerHTML += `<div class="date-header">${dateStr}</div>`;
    }

    // ⏰ Time (IST)
    const time = d.toLocaleTimeString("en-IN", {
      hour: "2-digit",
      minute: "2-digit",
      hour12: true,
      timeZone: "Asia/Kolkata"
    });

    // 🧾 Card
container.innerHTML += `  
  <div class="card" onclick='openDetails(${JSON.stringify(item)})' style="cursor:pointer;">
        <b>${item.service}</b><br>
        ${item.name}<br>
        ${item.phone}<br>
        ${item.surveyor || "-"}<br>
        <div class="time">${time}</div>
      </div>
    `;
  });
}
let currentData = [];

function openDetails(item) {

  currentView = "details";
  const detail = document.getElementById("detailView");

  document.getElementById("data").style.display = "none";
  detail.style.display = "block";

 function val(v) {
  if (v === undefined || v === null) return "-";
  const cleaned = v.toString().trim();
  return cleaned !== "" ? cleaned : "-";
}

  function link(url) {
    return url ? `<a href="${url}" target="_blank">View</a>` : "-";
  }

  detail.innerHTML = `
    <div class="card" style="position:relative;">

      <!-- ❌ CLOSE BUTTON -->
      <span onclick="closeDetails()" 
        style="position:absolute; top:10px; right:15px; font-size:20px; cursor:pointer;">
        ❌
      </span>

      <h3 style="text-align:center;">Service Details</h3>

      <b>Service No:</b> ${val(item.service)}<br><br>
      <b>Name:</b> ${val(item.name)}<br><br>
      <b>Phone:</b> ${val(item.phone)}<br><br>
      <b>Address:</b> ${val(item.address)}<br><br>

      <b>Division:</b> ${val(item.division)}<br><br>
      <b>Subdivision:</b> ${val(item.subdivision)}<br><br>
      <b>Section:</b> ${val(item.section)}<br><br>
      <b>Distribution:</b> ${val(item.distribution)}<br><br>

    <b>Panel No 1:</b> ${val(item.panel1)}<br><br>
<b>Panel No 2:</b> ${val(item.panel2)}<br><br>
<b>Panel No 3:</b> ${val(item.panel3)}<br><br>
<b>Panel No 4:</b> ${val(item.panel4)}<br><br>

<b>Inverter Service No:</b> ${val(item.inverterSerial)}<br><br>

      <hr>

      <b>Panel Image:</b><br>
      ${link(item.panels)}<br><br>

      <b>Inverter Image:</b><br>
      ${link(item.inverter)}<br><br>

      <b>Earth Image:</b><br>
      ${link(item.earth)}<br><br>

      <b>Current Bill:</b><br>
      ${link(item.bill)}<br><br>

      <b>Aadhar Card:</b><br>
      ${link(item.aadhar)}<br><br>

      <b>Document 1:</b><br>
      ${link(item.doc1)}<br><br>

      <b>Document 2:</b><br>
      ${link(item.doc2)}<br><br>

    </div>
  `;
}
// BACK
function goBack() {

  if (currentView === "search" || currentView === "division" || currentView === "details") {

    document.getElementById("data").style.display = "none";
    document.getElementById("divisionSection").style.display = "block";

    document.getElementById("totalCount").style.display = "none";
    document.getElementById("searchBar").style.display = "none";
    document.getElementById("searchPanel").style.display = "none";
document.getElementById("detailView").style.display = "none";
    currentView = "home";

  } else {
    window.location.href = "index.html";
  }

  // reset buttons
  const btn1 = document.getElementById("btn1");
  const btn2 = document.getElementById("btn2");

  btn1.disabled = false;
  btn2.disabled = false;

  btn1.innerText = "Tadepalligudem";
  btn2.innerText = "Narsipatnam";

  btn1.classList.remove("loading");
  btn2.classList.remove("loading");

  isProcessing = false;
}
  function closeDetails() {
  document.getElementById("detailView").style.display = "none";
  document.getElementById("data").style.display = "block";
  currentView = "division";
}
  function applyDateFilter() {

  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  if (!from || !to) {
    alert("Select both dates");
    return;
  }

  const fromDate = new Date(from);
  const toDate = new Date(to);
  toDate.setHours(23,59,59,999);

  const filtered = fullData.filter(item => {

    if (!item.timestamp) return false;

    const d = toIST(item.timestamp);
    if (!d) return false;

    return d >= fromDate && d <= toDate &&
           (item.division || "").toLowerCase().replace(/\s+/g,"") === 
selectedDivision.toLowerCase().replace(/\s+/g,"")
  });

  document.getElementById("divisionSection").style.display = "none";
  document.getElementById("data").style.display = "block";
  document.getElementById("totalCount").style.display = "block";

  document.getElementById("totalCount").innerText =
    `${selectedDivision} | Filtered: ${filtered.length}`;

  renderData(filtered);

  document.getElementById("searchPanel").style.display = "none";
}
</script>

</body>
</html>
