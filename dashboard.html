<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

/* HEADER */
.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: 600;
}

.back-btn {
  position: absolute;
  left: 12px;
  cursor: pointer;
}

.filter-btn {
  position: absolute;
  right: 12px;
  cursor: pointer;
  font-size: 14px;
  background: white;
  color: #1e88e5;
  padding: 5px 12px;
  border-radius: 8px;
}

#filterPanel {
  display: none;
  position: absolute;
  top: 65px;
  right: 10px;
  width: 240px;
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

#filterPanel input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

.apply-btn, .clear-btn {
  width: 100%;
  padding: 10px;
  border: none;
  margin-top: 5px;
}

.apply-btn { background: #1e88e5; color: white; }
.clear-btn { background: #f44336; color: white; }

.count-box {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  color: #1e88e5;
  background: #e3f2fd;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.date-header {
  font-weight: bold;
  color: #1e88e5;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
  <div class="filter-btn" onclick="toggleFilter()">Filter</div>
</div>

<div id="filterPanel">
  <input type="date" id="fromDate">
  <input type="date" id="toDate">
  <button class="apply-btn" onclick="applyFilter()">Apply</button>
  <button class="clear-btn" onclick="clearFilter()">Clear</button>
</div>

<div class="count-box" id="totalCount">Loading...</div>

<div class="container" id="data"></div>

<script>

let fullData = [];

// ✅ SAFE DATE PARSER (FIXED)
function parseDate(timestamp) {
  const parts = timestamp.split(/[- :]/);
  return new Date(
    parts[0],
    parts[1] - 1,
    parts[2],
    parts[3],
    parts[4],
    parts[5]
  );
}

async function loadData() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbw8Iuo-DLYM9Uw5-4AeA23L0xwEwEONjZL3pAfDq-JAsnRmPy3c1sj_Wb-JBQoEtLXn/exec?type=all");
  fullData = await res.json();

  const today = new Date();

  const todayData = fullData.filter(item => {
    const d = parseDate(item.timestamp);
    return d.toDateString() === today.toDateString();
  });

  renderData(todayData);
}

function renderData(data) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  const totalCount = fullData.length;
  const filteredCount = data.length;

  const today = new Date();

  const isTodayView = data.every(item => {
    const d = parseDate(item.timestamp);
    return d.toDateString() === today.toDateString();
  });

  document.getElementById("totalCount").innerText =
    isTodayView
      ? `Today: ${filteredCount} | Total: ${totalCount}`
      : `Filtered: ${filteredCount} | Total: ${totalCount}`;

  let currentGroup = "";

  data.slice().reverse().forEach(item => {

    const d = parseDate(item.timestamp);
    const group = d.toDateString() === today.toDateString()
      ? "Today"
      : d.toLocaleDateString("en-GB");

    if (group !== currentGroup) {
      currentGroup = group;
      container.innerHTML += `<div class="date-header">${group}</div>`;
    }

    const time = d.toLocaleTimeString("en-IN", {
      hour: "2-digit",
      minute: "2-digit"
    });

    container.innerHTML += `
      <div class="card">
        <div><b>${item.service}</b></div>
        <div>${item.name}</div>
        <div>${item.phone}</div>
        <div>${item.surveyor || "-"}</div>
        <div style="font-size:12px;color:#888;">${time}</div>
      </div>
    `;
  });
}

// FILTER
function applyFilter() {
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const filtered = fullData.filter(item => {
    const d = parseDate(item.timestamp);

    const dateStr =
      d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0");

    if (from && dateStr < from) return false;
    if (to && dateStr > to) return false;

    return true;
  });

  renderData(filtered);
  toggleFilter();
}

function clearFilter() {
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";

  const today = new Date();

  const todayData = fullData.filter(item => {
    const d = parseDate(item.timestamp);
    return d.toDateString() === today.toDateString();
  });

  renderData(todayData);
  toggleFilter();
}

function toggleFilter() {
  const panel = document.getElementById("filterPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function goBack() {
  window.location.href = "index.html";
}

loadData();

</script>

</body>
</html>
