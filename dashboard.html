<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: bold;
}

.back-btn { position: absolute; left: 12px; cursor: pointer; }

.count-box {
  text-align: center;
  padding: 10px;
  background: #e3f2fd;
  font-weight: bold;
}

.div-btn {
  width: 90%;
  padding: 16px;
  margin: 12px auto;
  display: block;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #1e88e5, #1565c0);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.div-btn.loading {
  opacity: 0.6;
  pointer-events: none;
}

.container { padding: 10px; }

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.date-header {
  font-weight: bold;
  margin: 10px 5px;
  color: #1e88e5;
}

.time { font-size: 12px; color: gray; }
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
</div>

<div id="totalCount" class="count-box" style="display:none;"></div>

<div id="divisionSection" style="padding:20px; text-align:center;">
  <button id="btn1" class="div-btn" onclick="showDivision(event, 'Tadepalligudem')">
    Tadepalligudem
  </button>

  <button id="btn2" class="div-btn" onclick="showDivision(event, 'Narsipatnam')">
    Narsipatnam
  </button>
</div>

<div id="data" class="container" style="display:none;"></div>

<script>

let fullData = [];
let isProcessing = false;

// ✅ MAIN FUNCTION (FINAL)
function showDivision(e, divisionName) {

  const btn1 = document.getElementById("btn1");
  const btn2 = document.getElementById("btn2");

  // ✅ VALIDATION
  if (!fullData.length || isProcessing || btn1.disabled || btn2.disabled) return;

  isProcessing = true;

  const btn = e.currentTarget;

  btn1.disabled = true;
  btn2.disabled = true;

  btn.innerText = "Loading...";
  btn.classList.add("loading");

  let divisionData = fullData.filter(item => {
    const div = (item.division || "").toLowerCase().trim();
    const btnName = divisionName.toLowerCase().trim();
    return div.replace(/\s+/g, "") === btnName.replace(/\s+/g, "");
  });

  divisionData.sort((a, b) => {
    return toIST(a.timestamp) - toIST(b.timestamp);
  });

  const today = getTodayIST();

  const todayData = divisionData.filter(item => {
    const d = toIST(item.timestamp);
    return d &&
      d.getFullYear() === today.getFullYear() &&
      d.getMonth() === today.getMonth() &&
      d.getDate() === today.getDate();
  });

  document.getElementById("divisionSection").style.display = "none";
  document.getElementById("data").style.display = "block";

  document.getElementById("totalCount").style.display = "block";
  document.getElementById("totalCount").innerText =
    `${divisionName} | Today: ${todayData.length} | Total: ${divisionData.length}`;

  renderData(todayData);

  isProcessing = false;
}

// ✅ RENDER
function renderData(data) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<p style='text-align:center;'>No data found</p>";
    return;
  }

  let currentDate = "";

  data.slice().reverse().forEach(item => {

    const d = toIST(item.timestamp);

    const dateStr =
      String(d.getDate()).padStart(2, "0") + "/" +
      String(d.getMonth() + 1).padStart(2, "0") + "/" +
      d.getFullYear();

    if (dateStr !== currentDate) {
      currentDate = dateStr;
      container.innerHTML += `<div class="date-header">${dateStr}</div>`;
    }

    const time = d.toLocaleTimeString("en-IN", {
      hour: "2-digit",
      minute: "2-digit",
      hour12: true,
      timeZone: "Asia/Kolkata"
    });

    container.innerHTML += `
      <div class="card">
        <b>${item.service}</b><br>
        ${item.name}<br>
        ${item.phone}<br>
        <div class="time">${time}</div>
      </div>
    `;
  });
}

// ✅ BACK BUTTON FIX
function goBack() {

  const dataVisible = document.getElementById("data").style.display === "block";

  if (dataVisible) {
    document.getElementById("data").style.display = "none";
    document.getElementById("divisionSection").style.display = "block";
    document.getElementById("totalCount").style.display = "none";

    const btn1 = document.getElementById("btn1");
    const btn2 = document.getElementById("btn2");

    btn1.disabled = false;
    btn2.disabled = false;

    btn1.innerText = "Tadepalligudem";
    btn2.innerText = "Narsipatnam";

    btn1.classList.remove("loading");
    btn2.classList.remove("loading");

    isProcessing = false;

  } else {
    window.location.href = "index.html";
  }
}

// ✅ IST FIX
function toIST(dateInput) {
  const parts = dateInput.split(/[- :]/);
  return new Date(parts[0], parts[1]-1, parts[2], parts[3], parts[4], parts[5]);
}

function getTodayIST() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  });

  const parts = formatter.formatToParts(now);
  return new Date(
    parts.find(p=>p.type==="year").value,
    parts.find(p=>p.type==="month").value-1,
    parts.find(p=>p.type==="day").value
  );
}

// ✅ LOAD DATA
async function loadData() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbw8Iuo-DLYM9Uw5-4AeA23L0xwEwEONjZL3pAfDq-JAsnRmPy3c1sj_Wb-JBQoEtLXn/exec");
  fullData = await res.json();
  fullData = fullData.filter(item => item.timestamp);

  document.getElementById("btn1").disabled = false;
  document.getElementById("btn2").disabled = false;
}

loadData();

</script>

</body>
</html>
