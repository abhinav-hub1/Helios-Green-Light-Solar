<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

/* HEADER */
.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: 600;
}

.back-btn {
  position: absolute;
  left: 12px;
  cursor: pointer;
}

/* FILTER BUTTON */
.filter-btn {
  position: absolute;
  right: 12px;
  cursor: pointer;
  font-size: 14px;
  background: white;
  color: #1e88e5;
  padding: 5px 12px;
  border-radius: 8px;
  font-weight: 500;
}

/* PROFESSIONAL FILTER PANEL */
#filterPanel {
  display: none;
  position: absolute;
  top: 65px;
  right: 10px;
  width: 240px;
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}

.filter-title {
  font-weight: bold;
  margin-bottom: 10px;
  color: #1e88e5;
}

#filterPanel label {
  font-size: 13px;
  color: #555;
  display: block;
  margin-bottom: 4px;
}

#filterPanel input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
  font-size: 14px;
}

.apply-btn {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e88e5;
  color: white;
  font-weight: 500;
}

.clear-btn {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #f44336;
  color: white;
  margin-top: 6px;
  font-weight: 500;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* COUNT */
.count-box {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  color: #1e88e5;
  background: #e3f2fd;
}

/* SELECTED RANGE */
#selectedRange {
  text-align:center;
  font-size:13px;
  color:#555;
  margin-top:5px;
}

/* DATA */
.container {
  padding: 12px;
}

.date-header {
  margin: 10px 5px;
  font-weight: bold;
  color: #1e88e5;
}

.card {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.service {
  font-weight: bold;
  color: #1e88e5;
}

.text {
  font-size: 14px;
  margin-top: 4px;
}

.time {
  font-size: 12px;
  color: #888;
}

#loading {
  text-align: center;
  padding: 15px;
  display: none;
  color: #1e88e5;
}
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
  <div class="filter-btn" onclick="toggleFilter()">Filter</div>
</div>

<!-- FILTER PANEL -->
<div id="filterPanel">
  <div class="filter-title">Filter by Date</div>

  <label>From</label>
  <input type="date" id="fromDate">

  <label>To</label>
  <input type="date" id="toDate">

  <button class="apply-btn" onclick="applyFilter()">Apply</button>
  <button class="clear-btn" onclick="clearFilter()">Clear</button>
</div>

<div class="count-box" id="totalCount">Total: 0</div>

<div id="selectedRange"></div>

<div id="loading">Loading...</div>

<div class="container" id="data"></div>

<script>

let fullData = [];

async function loadData() {
  document.getElementById("loading").style.display = "block";

  const res = await fetch("https://script.google.com/macros/s/AKfycbwhlMxTxB4pPXi6ApKLO60yRMF_HKSutI0R98xv-S3fyLxsVCQ0jUosaLaUDBQIa88v/exec?type=all");
  fullData = await res.json();

  document.getElementById("loading").style.display = "none";

  renderData(fullData);
}

function renderData(data) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  document.getElementById("totalCount").innerText =
    "Total Submissions: " + data.length;

  const today = new Date();

  function formatDate(dateStr) {
    const d = new Date(dateStr.replace(" ", "T"));

    if (d.toDateString() === today.toDateString()) return "Today";

    return d.toLocaleDateString("en-GB");
  }

  let currentGroup = "";

  data.slice().reverse().forEach(item => {

    const d = new Date(item.timestamp.replace(" ", "T"));
    const group = formatDate(item.timestamp);

    if (group !== currentGroup) {
      currentGroup = group;

      let displayText = group;

      if (group === "Today") {
        const todayCount = data.filter(item => {
          const d = new Date(item.timestamp.replace(" ", "T"));
          return d.toDateString() === today.toDateString();
        }).length;

        displayText = `Today (${todayCount})`;
      }

      container.innerHTML += `<div class="date-header">${displayText}</div>`;
    }

    const time = d.toLocaleTimeString();

    container.innerHTML += `
      <div class="card">
        <div class="service">${item.service}</div>
        <div class="text">Name: ${item.name}</div>
        <div class="text">Phone: ${item.phone}</div>
        <div class="time">${time}</div>
      </div>
    `;
  });
}

// toggle filter
function toggleFilter() {
  const panel = document.getElementById("filterPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

// apply filter
function applyFilter() {

  document.getElementById("loading").style.display = "block";

  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  const filtered = fullData.filter(item => {
    const d = new Date(item.timestamp.replace(" ", "T"));
    const itemDate = d.toISOString().split("T")[0];

    if (from && itemDate < from) return false;
    if (to && itemDate > to) return false;

    return true;
  });

  let text = "";
  if (from && to) text = `📅 ${from.split("-").reverse().join("/")} → ${to.split("-").reverse().join("/")}`;
  else if (from) text = `📅 From ${from.split("-").reverse().join("/")}`;
  else if (to) text = `📅 Till ${to.split("-").reverse().join("/")}`;

  document.getElementById("selectedRange").innerText = text;

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    renderData(filtered);
    document.getElementById("filterPanel").style.display = "none";
  }, 300);
}

// clear filter
function clearFilter() {

  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  document.getElementById("selectedRange").innerText = "";

  renderData(fullData);

  document.getElementById("filterPanel").style.display = "none";
}

// close on outside click
document.addEventListener("click", function(e) {
  const panel = document.getElementById("filterPanel");
  const btn = document.querySelector(".filter-btn");

  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.style.display = "none";
  }
});

function goBack() {
  window.location.href = "index.html";
}

loadData();

</script>

</body>
</html>
