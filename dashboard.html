<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

/* HEADER */
.header {
  background: #1e88e5;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  position: relative;
}

.back-btn {
  position: absolute;
  left: 12px;
  top: 15px;
  cursor: pointer;
}

/* SUMMARY */
.summary {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.box {
  flex: 1;
  background: white;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.box h3 {
  margin: 5px 0;
  color: #1e88e5;
}

/* SEARCH */
.search {
  padding: 10px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* DATE GROUP */
.group {
  margin: 10px;
}

.group-header {
  background: #e3f2fd;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* CARD */
.card {
  background: white;
  margin-top: 8px;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.service {
  font-weight: bold;
  color: #1e88e5;
}

.text {
  font-size: 14px;
  margin-top: 4px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
</div>

<div class="summary">
  <div class="box">
    <div>Total</div>
    <h3 id="total">0</h3>
  </div>
  <div class="box">
    <div>Today</div>
    <h3 id="today">0</h3>
  </div>
</div>

<div class="search">
  <input type="text" id="search" placeholder="Search Service Number..." oninput="filterData()">
</div>

<div id="data"></div>

<script>

let fullData = [];

async function loadData() {

  const res = await fetch("https://script.google.com/macros/s/AKfycbwhlMxTxB4pPXi6ApKLO60yRMF_HKSutI0R98xv-S3fyLxsVCQ0jUosaLaUDBQIa88v/exec?type=all");
  fullData = await res.json();

  renderData(fullData);
}

function renderData(data) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  const today = new Date();

  // COUNTS
  let todayCount = 0;

  data.forEach(item => {
    const d = new Date(item.timestamp);
    if (d.toDateString() === today.toDateString()) {
      todayCount++;
    }
  });

  document.getElementById("total").innerText = data.length;
  document.getElementById("today").innerText = todayCount;

  // GROUPING
  const groups = {};

  data.forEach(item => {
    const d = new Date(item.timestamp);
    const key = d.toDateString();

    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  Object.keys(groups).reverse().forEach(date => {

    const groupDiv = document.createElement("div");
    groupDiv.className = "group";

    const header = document.createElement("div");
    header.className = "group-header";
    header.innerText = `${date} (${groups[date].length})`;

    const content = document.createElement("div");

    header.onclick = () => {
      content.classList.toggle("hidden");
    };

    groups[date].forEach(item => {
      content.innerHTML += `
        <div class="card">
          <div class="service">${item.service}</div>
          <div class="text">Name: ${item.name}</div>
          <div class="text">Phone: ${item.phone}</div>
        </div>
      `;
    });

    groupDiv.appendChild(header);
    groupDiv.appendChild(content);
    container.appendChild(groupDiv);
  });
}

// SEARCH
function filterData() {
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = fullData.filter(item =>
    item.service.toString().includes(value)
  );

  renderData(filtered);
}

function goBack() {
  window.location.href = "index.html";
}

loadData();

</script>

</body>
</html>
