<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

/* HEADER */
.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: 600;
}

.back-btn {
  position: absolute;
  left: 12px;
  font-size: 20px;
  cursor: pointer;
}

/* COUNT BOX */
.count-box {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  color: #1e88e5;
  background: #e3f2fd;
}

/* CONTAINER */
.container {
  padding: 12px;
}

/* DATE HEADER */
.date-header {
  margin: 10px 5px;
  font-weight: bold;
  color: #1e88e5;
}

/* CARD */
.card {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.service {
  font-size: 16px;
  font-weight: bold;
  color: #1e88e5;
}

.text {
  font-size: 14px;
  color: #444;
  margin-top: 4px;
}

.time {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
}

#loading {
  text-align: center;
  padding: 20px;
  color: #1e88e5;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
</div>

<div class="count-box" id="totalCount">Total: 0</div>

<div id="loading">Loading data...</div>

<div class="container" id="data"></div>

<script>

async function loadData() {

  const loading = document.getElementById("loading");
  const container = document.getElementById("data");

  loading.style.display = "block";
  container.innerHTML = "";

  const url = "https://script.google.com/macros/s/AKfycbwhlMxTxB4pPXi6ApKLO60yRMF_HKSutI0R98xv-S3fyLxsVCQ0jUosaLaUDBQIa88v/exec?type=all";

  const res = await fetch(url);
  const data = await res.json();

  loading.style.display = "none";

  // ✅ TOTAL COUNT
  document.getElementById("totalCount").innerText =
    "Total Submissions: " + data.length;

  // 🔥 DATE LOGIC
  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  function formatDate(dateStr) {
    const d = new Date(dateStr);

    if (d.toDateString() === today.toDateString()) {
      return "Today";
    }

    if (d.toDateString() === yesterday.toDateString()) {
      return "Yesterday";
    }

    return d.toLocaleDateString("en-GB");
  }

  // 🔥 COUNT PER DAY
  const counts = {};
  data.forEach(item => {
    const group = formatDate(item.timestamp);
    counts[group] = (counts[group] || 0) + 1;
  });

  let currentGroup = "";

  // 🔥 DISPLAY DATA
  data.reverse().forEach(item => {

    const group = formatDate(item.timestamp);

    if (group !== currentGroup) {
      currentGroup = group;

      container.innerHTML += `
        <div class="date-header">
          ${group} (${counts[group]})
        </div>
      `;
    }

    const time = new Date(item.timestamp).toLocaleTimeString();

    container.innerHTML += `
      <div class="card">
        <div class="service">${item.service}</div>
        <div class="text">Name: ${item.name}</div>
        <div class="text">Phone: ${item.phone}</div>
        <div class="text">Address: ${item.address}</div>
        <div class="time">Time: ${time}</div>
      </div>
    `;
  });
}

// BACK
function goBack() {
  window.location.href = "index.html";
}

// LOAD
loadData();

</script>

</body>
</html>
