<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.header {
  background: #1e88e5;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
  font-weight: 600;
}

.back-btn {
  position: absolute;
  left: 12px;
  font-size: 20px;
  cursor: pointer;
}

.count-box {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  color: #1e88e5;
  background: #e3f2fd;
}

/* 🔥 FILTER BOX */
.filter-box {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: #fff;
}

.filter-box input, .filter-box button {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.filter-box button {
  background: #1e88e5;
  color: white;
  border: none;
  cursor: pointer;
}

.container {
  padding: 12px;
}

.date-header {
  margin: 10px 5px;
  font-weight: bold;
  color: #1e88e5;
}

.card {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.service {
  font-size: 16px;
  font-weight: bold;
  color: #1e88e5;
}

.text {
  font-size: 14px;
  color: #444;
  margin-top: 4px;
}

.time {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
}

#loading {
  text-align: center;
  padding: 20px;
  color: #1e88e5;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">←</div>
  Dashboard
</div>

<div class="count-box" id="totalCount">Total: 0</div>

<!-- 🔥 FILTER -->
<div class="filter-box">
  <input type="date" id="fromDate">
  <input type="date" id="toDate">
  <button onclick="applyFilter()">Filter</button>
</div>

<div id="loading">Loading data...</div>

<div class="container" id="data"></div>

<script>

let fullData = [];

async function loadData() {

  const loading = document.getElementById("loading");
  const container = document.getElementById("data");

  loading.style.display = "block";
  container.innerHTML = "";

  const res = await fetch("https://script.google.com/macros/s/AKfycbwhlMxTxB4pPXi6ApKLO60yRMF_HKSutI0R98xv-S3fyLxsVCQ0jUosaLaUDBQIa88v/exec?type=all");
  fullData = await res.json();

  loading.style.display = "none";

  renderData(fullData);
}

// 🔥 MAIN RENDER FUNCTION
function renderData(data) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  document.getElementById("totalCount").innerText =
    "Total Submissions: " + data.length;

  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  function formatDate(dateStr) {
    const d = new Date(dateStr);

    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yesterday.toDateString()) return "Yesterday";

    return d.toLocaleDateString("en-GB");
  }

  const counts = {};
  data.forEach(item => {
    const group = formatDate(item.timestamp);
    counts[group] = (counts[group] || 0) + 1;
  });

  let currentGroup = "";

  data.slice().reverse().forEach(item => {

    const group = formatDate(item.timestamp);

    if (group !== currentGroup) {
      currentGroup = group;

      container.innerHTML += `
        <div class="date-header">
          ${group} (${counts[group]})
        </div>
      `;
    }

    const time = new Date(item.timestamp).toLocaleTimeString();

    container.innerHTML += `
      <div class="card">
        <div class="service">${item.service}</div>
        <div class="text">Name: ${item.name}</div>
        <div class="text">Phone: ${item.phone}</div>
        <div class="text">Address: ${item.address}</div>
        <div class="time">Time: ${time}</div>
      </div>
    `;
  });
}

// 🔥 APPLY FILTER
function applyFilter() {

  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  if (!from && !to) {
    renderData(fullData);
    return;
  }

  const filtered = fullData.filter(item => {
    const d = new Date(item.timestamp);

    const fromDate = from ? new Date(from) : null;
    const toDate = to ? new Date(to) : null;

    if (fromDate && d < fromDate) return false;
    if (toDate && d > new Date(toDate.setHours(23,59,59))) return false;

    return true;
  });

  renderData(filtered);
}

// BACK
function goBack() {
  window.location.href = "index.html";
}

// LOAD
loadData();

</script>

</body>
</html>
